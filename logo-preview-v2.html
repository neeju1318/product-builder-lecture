<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>신규 로고 미리보기 (안경 없음)</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            margin: 0;
        }
        .logo-container {
            padding: 60px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        svg {
            width: 240px;
            height: 240px;
        }
        .desc {
            text-align: center;
            max-width: 500px;
            line-height: 1.6;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: #ff4757;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <!-- New SVG (No Glasses) -->
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="18" stroke="url(#paint0_linear)" stroke-width="2.5"/>
          <path d="M11 16C11 12 14 9 20 9C26 9 29 12 29 16" stroke="url(#paint0_linear)" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="15" cy="22" r="2" fill="url(#paint0_linear)"/>
          <circle cx="25" cy="22" r="2" fill="url(#paint0_linear)"/>
          <path d="M15 30C15 30 17.5 33 20 33C22.5 33 25 30 25 30" stroke="url(#paint0_linear)" stroke-width="2.5" stroke-linecap="round"/>
          <defs>
            <linearGradient id="paint0_linear" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
              <stop stop-color="#54a0ff"/>
              <stop offset="1" stop-color="#ff4757"/>
            </linearGradient>
          </defs>
        </svg>
    </div>
    <div class="desc">
        <span class="badge">V2: 안경 제거</span>
        <h2>안경 없는 스마트 남성 로고</h2>
        <p>요청하신 대로 안경을 제거하고, 뚜렷한 눈매와 밝은 미소로 스마트한 이미지를 강조했습니다.</p>
        <p><strong>확인 방법:</strong> <code>logo-preview-v2.html</code> 파일을 브라우저로 열어 디자인을 확인해 주세요.</p>
    </div>
</body>
</html>
