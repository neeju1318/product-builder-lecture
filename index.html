<!DOCTYPE html>
<html lang="ko">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2ZLTNVFJP4"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2ZLTNVFJP4');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일상생활 유틸리티 모음</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <div class="nav-inner">
            <a href="#" class="logo">🛠️ 일상 유틸리티</a>
            <nav class="main-nav">
                <a href="#lotto">로또 생성기</a>
                <a href="#meal">식사 추천</a>
            </nav>
            <button id="theme-btn">🌓</button>
        </div>
    </header>
    <main>
        <section class="tool-hub hero">
            <h1>일상생활 유용한 유틸리티</h1>
            <div class="tool-grid">
                <a href="#lotto" class="tool-card">🎱 로또 번호 생성</a>
                <a href="#meal" class="tool-card">🍱 식사 메뉴 추천</a>
            </div>
        </section>
        <section id="lotto" class="card">
            <h2>🎱 로또 번호 생성기</h2>
            <div class="mode-selector">
                <button class="mode-btn active" data-mode="hot">🔥 핫넘버</button>
                <button class="mode-btn" data-mode="cold">❄️ 콜드넘버</button>
                <button class="mode-btn" data-mode="random">🎲 랜덤</button>
            </div>
            <p id="mode-desc"></p>
            <div class="action-area"><button id="generate-btn">번호 생성</button></div>
            <div id="numbers-container"></div>
        </section>
        <section id="meal" class="card">
            <div class="section-header">
                <h2>🍱 식사 메뉴 추천</h2>
                <div class="menu-count-badge">현재 <span id="total-menu-count">0</span>가지 메뉴</div>
            </div>
            <div id="meal-display" class="meal-display">
                <div class="meal-placeholder"><span class="icon">🤔</span><p>오늘은 무엇을 먹을까요?</p></div>
            </div>
            <div class="action-area"><button id="recommend-meal-btn">메뉴 무작위 추천!</button></div>
        </section>
    </main>
    <script src="main.js" type="module"></script>
</body>
</html>
